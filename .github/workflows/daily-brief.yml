# The autonomy loop: fetch headlines, match rules, simulate impacts, commit
# the receipts, and redeploy the live site — no human, no LLM, no API key.
#
# Cadence: every 2 hours (GitHub cron is best-effort and can lag under load —
# this is "feels live", not a real-time tick). Honest scope: FRED/Pink Sheet
# PRICES are MONTHLY, so a 2-hour cadence makes the NEWS/EVENTS/THESES feel
# dynamic, not the price levels. `commit if changed` keeps no-news runs from
# spamming the history, and the Pages redeploy fires only when news actually
# moved — so the site refreshes when there's something new, not on a timer.
name: daily-brief
on:
  schedule:
    - cron: "20 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: refresh + audit data (clean data or no publish)
        run: |
          uv run opencopper data refresh
          uv run opencopper data check
      - name: run news pipeline
        run: uv run opencopper news
      - name: archive brief
        run: |
          mkdir -p docs/briefs
          d=$(date -u +%F)
          cp out/news-brief.md "docs/briefs/$d.md"
          cp out/news-brief.md docs/briefs/latest.md
      - name: commit receipts if changed
        id: commit
        run: |
          git config user.name "opencopper-daily"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news docs/briefs data/theses-auto.json
          if git diff --cached --quiet; then
            echo "no new rule-matched news"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "brief: $(date -u +'%F %H:%MZ')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: redeploy site (only when news moved)
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
