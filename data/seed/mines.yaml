# Tracked mine ledger — v1 SEED DATA.
#
# Every number here is a rounded estimate hand-seeded from public reporting
# (company FY2024 disclosures, USGS, trade press) and is marked
# basis: seed-estimate. The extraction pipeline (EDGAR EX-96 + MinMod) is the
# mechanism for replacing these with cited, verifiable values — see README
# roadmap. capacity_kt and production_kt are kt of CONTAINED COPPER per year.
# production_kt holds 2024 actuals plus ramp profiles for ramping mines;
# 2025-26 real-world EVENTS are expressed as scenario files, so the engine's
# baseline stays a clean counterfactual.
# lat/lon are approximate (world-map display only). reserves_kt/_as_of come
# from this repo's CITED extractions (evals/sample_extractions/) and drive
# depletion: the engine retires a mine when cumulative production exhausts
# the remaining reserve (La Caridad runs out inside the horizon).
