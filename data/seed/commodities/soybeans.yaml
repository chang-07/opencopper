# Seed-estimates from USDA WASDE public figures; flagged. Units: kt.
name: soybeans
unit: kt
source: "USDA WASDE public figures (seed-estimate); price: FRED PSOYBUSDM"
basis: seed-estimate
world:
  production_kt: {2024: 425000, 2025: 430000}
  reserves_kt: 134000    # ending stocks
  production_growth_pct: 1.5
demand:
  base_kt: 410000
  base_year: 2025
  growth_pct: 1.5
  basis: "USDA world crush + food/feed use"
top_producers:
  - {country: Brazil, production_kt: 169000}
  - {country: United States, production_kt: 113000}
  - {country: Argentina, production_kt: 50000}
  - {country: China, production_kt: 20000}
  - {country: India, production_kt: 12000}
notes: "Brazil overtook the US a decade ago and now swings the market; China buys ~60% of world imports, making soybeans the most trade-war-sensitive commodity in the model."
price_note: "US ~$439/t May 2026 (FRED)"
caveats: "Annual crop + Southern/Northern hemisphere double harvest cycle; biodiesel demand growing the fuel link."
drivers:
  other: 0.92     # feed (crush) + food
  transport: 0.08 # biodiesel
