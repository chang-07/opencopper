# Thesis registry — the machine-readable twin of PREDICTIONS.md.
# Every entry is a falsifiable call with its creation date, the model state
# it came from, and HOW it resolves. `opencopper theses` marks each against
# live data where a keyless series exists (metric: annual_avg_band /
# price_change) and carries the rest as external until a `resolution:` block
# is added by hand with a source. Hits and misses both stay forever.
theses:
